version: '3.8'

services:
  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: .
    working_dir: /app/backend
    command: npm run dev
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=development
      - FRONTEND_URL=http://localhost:5173
      - MONGO_URI=mongodb://mongo:27017/quizmaster
      - JWT_SECRET=change_me_in_env
      - JWT_REFRESH_SECRET=change_me_in_env
      - JWT_EXPIRES_IN=15m
      - JWT_REFRESH_EXPIRES_IN=7d
    volumes:
      - ./backend:/app/backend
    depends_on:
      - mongo

  frontend:
    build: .
    working_dir: /app/frontend
    command: npm run dev -- --host
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000
    volumes:
      - ./frontend:/app/frontend
    depends_on:
      - backend

volumes:
  mongo_data:
